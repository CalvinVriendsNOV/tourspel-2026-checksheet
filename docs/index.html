<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>123 Tourspel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">123 Tourspel 2026</p>
      <h1>Tussenstand</h1>
      <p id="updated">Loading results…</p>
    </header>
    <section id="summary" class="summary-grid"></section>
    <section id="podium" class="podium"></section>
    <section class="card">
      <table class="standings-table">
        <thead><tr><th>Plek</th><th>Speler</th><th>1A</th><th>1B</th><th>1C</th><th>1D</th><th>Totaal</th></tr></thead>
        <tbody id="standings"></tbody>
      </table>
    </section>
    <section>
      <h2>Punten per etappe</h2>
      <div id="stage-chart" class="chart card"></div>
    </section>
    <section>
      <h2>Puntenverloop</h2>
      <div id="progression-chart" class="chart card"></div>
    </section>
    <section>
      <h2>Verken het spel</h2>
      <div class="controls">
        <label for="player-select">Speler voorspellingen</label>
        <select id="player-select"><option value="">Selecteer een speler</option></select>
        <label for="stage-select">Etappe details</label>
        <select id="stage-select"><option value="">Selecteer een etappe</option></select>
      </div>
      <div id="player-view"></div>
      <div id="stage-view"></div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
